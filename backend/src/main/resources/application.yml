spring:
  application:
    name: zonepilot-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/ZonePilot}
    username: ${SPRING_DATASOURCE_USERNAME:zonepilot}
    password: ${SPRING_DATASOURCE_PASSWORD:zonepilot}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

google:
  routes:
    api-key: ${GOOGLE_ROUTES_API_KEY:}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
